<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      const base = '/my-website'
      const redirectUrl = window.location.pathname
      if (!redirectUrl.startsWith(base + base)) {
        window.location.replace(`${base}/index.html?redirect=${redirectUrl}`)
      } else {
        console.error('Already redirected correctly.')
      }
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
  </body>
</html>
